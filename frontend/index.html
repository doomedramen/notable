<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Notable" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <title>Notable</title>
    <script>
      // Resolve the theme before first paint to avoid a flash.
      // Reads the zustand-persisted store from store/ui.ts ("notable-ui").
      (function () {
        try {
          var pref = "system";
          var raw = localStorage.getItem("notable-ui");
          var state = raw ? JSON.parse(raw).state : {};
          if (state) pref = state.theme || "system";
          var dark =
            pref === "dark" ||
            (pref === "system" &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.dataset.theme = dark ? "dark" : "light";
          if (dark) {
            document
              .querySelector('meta[name="theme-color"]')
              .setAttribute("content", "#1e1e2e");
          }
          if (state.customThemeUrl) {
            var link = document.createElement("link");
            link.id = "notable-custom-theme";
            link.rel = "stylesheet";
            link.href = state.customThemeUrl;
            document.head.appendChild(link);
          } else if (state.customTheme) {
            var legacyLink = document.createElement("link");
            legacyLink.id = "notable-custom-theme";
            legacyLink.rel = "stylesheet";
            legacyLink.href =
              "/api/themes/" + encodeURIComponent(state.customTheme) + ".css";
            document.head.appendChild(legacyLink);
          }
          var variables = state.customThemeVariables || {};
          Object.keys(variables).forEach(function (name) {
            if (/^--[a-z][a-z0-9-]*$/.test(name)) {
              document.documentElement.style.setProperty(name, variables[name]);
            }
          });
        } catch (e) {
          document.documentElement.dataset.theme = "light";
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
