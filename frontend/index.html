<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <title>Notable</title>
    <script>
      // Resolve the theme before first paint to avoid a flash.
      // Reads the zustand-persisted store from store/ui.ts ("notable-ui").
      (function () {
        try {
          var pref = "system";
          var raw = localStorage.getItem("notable-ui");
          if (raw) pref = JSON.parse(raw).state.theme || "system";
          var dark =
            pref === "dark" ||
            (pref === "system" &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.dataset.theme = dark ? "dark" : "light";
          if (dark) {
            document
              .querySelector('meta[name="theme-color"]')
              .setAttribute("content", "#1e1e2e");
          }
        } catch (e) {
          document.documentElement.dataset.theme = "light";
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
