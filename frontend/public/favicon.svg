  <rect x="6" y="13" width="6" height="2" rx="1" fill="white" />
  <rect x="6" y="17" width="6" height="2" rx="1" fill="white" />
  <rect x="6" y="21" width="6" height="2" rx="1" fill="white" />
  
  <!-- Vertical Spine Line (White) -->
